<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest Calc</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <main>
        <div class="calc">
            <header>
                <h2 class="calc__title">Оцените рост ваших инвестиций</h2>
            </header>
            <img src="./img/image1.png" alt="не удалось загурзить картинку" class="calc__img">
            <div class="calc__item calc__item--start">
                <span class="calc__label">
                    Начальная сумма
                </span>
                <p class="calc__value">
                    500000
                </p>
            </div>
            <div class="calc__item calc__item--duration">
                <span class="calc__label">
                    Длительность, лет
                </span>
                <p class="calc__value">
                    3
                </p>
            </div>
            <div class="calc__result">
                <span class="calc__result-label">
                    Результирующий баланс
                </span>
                <p class="calc__result-value">
                    12000
                </p>
            </div>
        </div>
        <div class="help">
            <header class="help__title">
                <h2 class="help__title">Как работает калькулятор</h2>
            </header>
            <aside class="help__image">
                <img src="./img/image2.png" alt="не удалось загурзить картинку" class="help__image">
            </aside> 
            <article class="help__text">
                <p class="help__text">
                    Калькулятор рассчитывает сумму через определенный срок, предполагая годовую доходность 12%.
                </p>
            </article>
        </div>
    </main>
</body>
</html>
